<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropTrust CRM</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #0f172a;
      color: white;
      padding: 24px;
    }
    .sidebar h2 {
      margin-top: 0;
      font-size: 24px;
    }
    .sidebar a {
      display: block;
      color: #cbd5e1;
      text-decoration: none;
      margin: 14px 0;
      font-size: 16px;
    }
    .sidebar a:hover {
      color: white;
    }
    .main {
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar h1 {
      margin: 0;
      font-size: 34px;
    }
    .btn {
      background: #0f172a;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #64748b;
    }
    .card .value {
      font-size: 30px;
      font-weight: bold;
    }
    .table-wrap {
      margin-top: 28px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
      font-size: 15px;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      color: #475569;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e2e8f0;
      font-size: 13px;
    }
    .hot {
      background: #dcfce7;
      color: #166534;
    }
    .medium {
      background: #fef3c7;
      color: #92400e;
    }
    .closed {
      background: #dbeafe;
      color: #1d4ed8;
    }
    .new {
      background: #e0e7ff;
      color: #3730a3;
    }
    .status-line {
      margin-top: 14px;
      color: #475569;
      font-size: 14px;
    }
    .error {
      color: #b91c1c;
    }
    .small {
      color: #64748b;
      font-size: 13px;
    }
    select, input, textarea {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      background: white;
      box-sizing: border-box;
      width: 100%;
    }
    textarea {
      min-height: 84px;
      resize: vertical;
    }
    .save-btn {
      background: #0f172a;
      color: white;
      border: none;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
      width: 100%;
    }
    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .edit-box {
      min-width: 220px;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        padding: 16px;
      }
      .sidebar a {
        display: inline-block;
        margin-left: 16px;
      }
      .topbar h1 {
        font-size: 28px;
      }
      .table-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>PropTrust CRM</h2>
      <a href="#">דשבורד</a>
      <a href="#">לידים</a>
      <a href="#">נכסים</a>
      <a href="#">מתווכים</a>
      <a href="#">משימות</a>
      <a href="#">אוטומציות</a>
      <a href="/index.html">חזרה לאתר</a>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>ניהול לידים ולקוחות</h1>
        <button class="btn" onclick="loadLeads()">רענון</button>
      </div>

      <div class="cards">
        <div class="card">
          <h3>לידים פעילים</h3>
          <div class="value" id="activeLeads">-</div>
        </div>
        <div class="card">
          <h3>לידים חדשים</h3>
          <div class="value" id="newLeads">-</div>
        </div>
        <div class="card">
          <h3>משקיעים</h3>
          <div class="value" id="investorLeads">-</div>
        </div>
        <div class="card">
          <h3>מתווכים</h3>
          <div class="value" id="brokerLeads">-</div>
        </div>
      </div>

      <div class="status-line" id="crmStatus">טוען לידים...</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>שם</th>
              <th>סוג</th>
              <th>עיר</th>
              <th>תקציב</th>
              <th>מקור</th>
              <th>שלב</th>
              <th>סטטוס</th>
              <th>טלפון</th>
              <th>אימייל</th>
              <th>צעד הבא / הערות פנימיות</th>
              <th>עדכון</th>
            </tr>
          </thead>
          <tbody id="leadsTableBody">
            <tr>
              <td colspan="11">טוען נתונים...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
        if (localStorage.getItem('proptrust_logged_in') !== 'true') {
      window.location.href = '/login.html';
    }
    const SUPABASE_URL = 'https://ybpefgbezelkmocrepkt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DmUNfsrfSGjcqN89HH-CnQ_SEqhBZ-g';

    const leadsTableBody = document.getElementById('leadsTableBody');
    const crmStatus = document.getElementById('crmStatus');
    const activeLeadsEl = document.getElementById('activeLeads');
    const newLeadsEl = document.getElementById('newLeads');
    const investorLeadsEl = document.getElementById('investorLeads');
    const brokerLeadsEl = document.getElementById('brokerLeads');

    const statusOptions = ['חדש', 'חם', 'בינוני', 'סגור'];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function badgeClass(status) {
      if (status === 'חם') return 'badge hot';
      if (status === 'בינוני') return 'badge medium';
      if (status === 'סגור') return 'badge closed';
      return 'badge new';
    }

    async function loadLeads() {
      crmStatus.textContent = 'טוען לידים...';
      crmStatus.className = 'status-line';
      leadsTableBody.innerHTML = '<tr><td colspan="11">טוען נתונים...</td></tr>';

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.desc`,
          {
            method: 'GET',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || 'Failed to load leads');
        }

        const leads = await response.json();

        activeLeadsEl.textContent = leads.length;
        newLeadsEl.textContent = leads.filter(l => (l.stage || '') === 'חדש').length;
        investorLeadsEl.textContent = leads.filter(l => ['משקיע', 'משקיעה'].includes(l.lead_type)).length;
        brokerLeadsEl.textContent = leads.filter(l => (l.lead_type || '') === 'מתווך').length;

        if (!leads.length) {
          leadsTableBody.innerHTML = '<tr><td colspan="11">עדיין אין לידים במערכת.</td></tr>';
          crmStatus.textContent = 'אין עדיין לידים. אפשר להשאיר ליד מהאתר הראשי.';
          return;
        }

        leadsTableBody.innerHTML = leads.map(lead => `
          <tr>
            <td>
              <strong>${escapeHtml(lead.full_name)}</strong>
              <div class="small">${escapeHtml(new Date(lead.created_at).toLocaleString('he-IL'))}</div>
            </td>
            <td>${escapeHtml(lead.lead_type || '-')}</td>
            <td>${escapeHtml(lead.city || '-')}</td>
            <td>${escapeHtml(lead.budget || '-')}</td>
            <td>${escapeHtml(lead.source || '-')}</td>
            <td>${escapeHtml(lead.stage || '-')}</td>
            <td><span class="${badgeClass(lead.status)}">${escapeHtml(lead.status || 'חדש')}</span></td>
            <td>${escapeHtml(lead.phone || '-')}</td>
            <td>${escapeHtml(lead.email || '-')}</td>
            <td class="edit-box">
              <div class="small" style="margin-bottom:6px;">צעד הבא</div>
              <input id="next-step-${lead.id}" value="${escapeHtml(lead.next_step || '')}" placeholder="למשל: שיחה מחר ב-10:00" />
              <div class="small" style="margin:10px 0 6px;">הערות פנימיות</div>
              <textarea id="notes-${lead.id}" placeholder="הערות עבודה פנימיות">${escapeHtml(lead.notes || '')}</textarea>
            </td>
            <td>
              <select id="status-${lead.id}">
                ${statusOptions.map(option => `
                  <option value="${escapeHtml(option)}" ${lead.status === option ? 'selected' : ''}>${escapeHtml(option)}</option>
                `).join('')}
              </select>
              <button class="save-btn" onclick="updateLead(${lead.id})">שמירה</button>
            </td>
          </tr>
        `).join('');

        crmStatus.textContent = `נטענו ${leads.length} לידים מהמערכת.`;
      } catch (err) {
        crmStatus.textContent = 'שגיאה בטעינת הלידים מהמערכת.';
        crmStatus.className = 'status-line error';
        leadsTableBody.innerHTML = '<tr><td colspan="11">לא ניתן לטעון נתונים כרגע.</td></tr>';
      }
    }

    async function updateLead(leadId) {
      const statusSelect = document.getElementById(`status-${leadId}`);
      const nextStepInput = document.getElementById(`next-step-${leadId}`);
      const notesInput = document.getElementById(`notes-${leadId}`);

      crmStatus.textContent = 'שומר עדכון...';
      crmStatus.className = 'status-line';

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/leads?id=eq.${leadId}`,
          {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({
              status: statusSelect.value,
              next_step: nextStepInput.value,
              notes: notesInput.value
            })
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || 'Failed to update lead');
        }

        crmStatus.textContent = 'הליד עודכן בהצלחה.';
        loadLeads();
      } catch (err) {
        crmStatus.textContent = 'עדכון הליד נכשל.';
        crmStatus.className = 'status-line error';
      }
    }

    loadLeads();
  </script>
</body>
</html>
